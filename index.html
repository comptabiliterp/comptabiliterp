<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Professionnel</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-dark: #090D16;
      --card-bg: #131A2A;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --input-bg: #1E293B;
      --border: #334155;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .container.admin-mode { max-width: 900px; }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    form { display: flex; flex-direction: column; gap: 20px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
    }

    .group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 500; color: var(--text-main); }
    
    input, textarea {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-main);
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    textarea { resize: vertical; min-height: 100px; }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background-color: var(--primary-hover); }
    button:disabled { background-color: var(--border); cursor: not-allowed; }

    .notice { text-align: center; font-size: 14px; margin-top: 16px; min-height: 20px; }

    .admin-trigger { position: fixed; bottom: 15px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; opacity: 0.5; }
    .admin-trigger:hover { opacity: 1; }
    
    .hidden { display: none !important; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { background-color: var(--input-bg); color: var(--text-muted); font-weight: 600; }
